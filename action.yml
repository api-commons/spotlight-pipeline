name: Spotlight Governance
description: Lint API descriptions (OpenAPI, AsyncAPI, Arazzo, …) with Spotlight as a CI governance gate.
author: API Commons
branding:
  icon: check-circle
  color: yellow
inputs:
  files:
    description: Glob(s) of API description files to lint (space- or newline-separated).
    required: false
    default: '**/{openapi,swagger,asyncapi,arazzo}.{yaml,yml,json}'
  ruleset:
    description: Path to a Spotlight ruleset. If it does not exist, a default ruleset extending the built-ins is used.
    required: false
    default: '.spotlight.yaml'
  fail-severity:
    description: Fail the job when a finding of this severity or worse is present (error | warn | info | hint).
    required: false
    default: 'error'
  version:
    description: spotlight-cli version (npm dist-tag or version).
    required: false
    default: 'latest'
  sarif:
    description: Also write a SARIF report to this path (for code scanning). Empty to skip.
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Run Spotlight
      shell: bash
      run: |
        set -euo pipefail
        RULESET="${{ inputs.ruleset }}"
        if [ ! -f "$RULESET" ]; then
          echo "No ruleset at '$RULESET' — using a default that extends the Spotlight built-ins."
          RULESET="$(mktemp).yaml"
          printf 'extends:\n  - ["spotlight:oas", "recommended"]\n' > "$RULESET"
        fi
        CLI="@spotlight-rules/spotlight-cli@${{ inputs.version }}"
        # Human-readable + GitHub annotations; fail per severity threshold.
        npx -y "$CLI" lint ${{ inputs.files }} \
          --ruleset "$RULESET" \
          --fail-severity "${{ inputs.fail-severity }}" \
          --format pretty --format github-actions
    - name: SARIF report
      if: ${{ inputs.sarif != '' }}
      shell: bash
      run: |
        RULESET="${{ inputs.ruleset }}"
        [ -f "$RULESET" ] || { RULESET="$(mktemp).yaml"; printf 'extends:\n  - ["spotlight:oas", "recommended"]\n' > "$RULESET"; }
        # --output writes the SARIF regardless of exit code; `|| true` so this
        # reporting step never fails the job (the gate is the step above).
        npx -y "@spotlight-rules/spotlight-cli@${{ inputs.version }}" lint ${{ inputs.files }} \
          --ruleset "$RULESET" \
          --format sarif --output "${{ inputs.sarif }}" || true
