name: Self-test
on: [push, pull_request]
jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Run THIS action against a clean sample with the example ruleset — must pass.
      - uses: ./
        with:
          files: 'examples/sample/openapi.yaml'
          ruleset: '.spotlight.example.yaml'
          fail-severity: 'error'
          sarif: 'spotlight.sarif'
      - name: SARIF produced
        run: test -s spotlight.sarif && echo "SARIF ok"
