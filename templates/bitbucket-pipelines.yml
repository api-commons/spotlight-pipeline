# bitbucket-pipelines.yml — Spotlight governance gate on pull requests.
pipelines:
  pull-requests:
    '**':
      - step:
          name: Spotlight Governance
          image: node:22
          script:
            - npx -y @spotlight-rules/spotlight-cli lint "apis/**/openapi.yaml"
                --ruleset .spotlight.yaml
                --fail-severity error
                --format pretty
