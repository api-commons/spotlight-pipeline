# .gitlab-ci.yml — Spotlight governance gate. Findings publish as JUnit.
spotlight-governance:
  image: node:22-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - npx -y @spotlight-rules/spotlight-cli lint "apis/**/openapi.yaml"
        --ruleset .spotlight.yaml
        --fail-severity error
        --format pretty --format junit --output spotlight-junit.xml
  artifacts:
    when: always
    reports:
      junit: spotlight-junit.xml
