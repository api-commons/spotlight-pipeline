# buildspec.yml — Spotlight governance gate for AWS CodeBuild.
version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 22
  build:
    commands:
      - npx -y @spotlight-rules/spotlight-cli lint "apis/**/openapi.yaml"
          --ruleset .spotlight.yaml --fail-severity error
          --format junit --output spotlight-junit.xml
reports:
  spotlight-governance:
    files:
      - spotlight-junit.xml
    file-format: JUNITXML
