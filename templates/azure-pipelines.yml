# azure-pipelines.yml — Spotlight governance gate. Findings publish as JUnit.
trigger: none
pr:
  - main
pool:
  vmImage: ubuntu-latest
steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '22.x'
  - script: >
      npx -y @spotlight-rules/spotlight-cli lint "apis/**/openapi.yaml"
      --ruleset .spotlight.yaml --fail-severity error
      --format pretty --format junit --output spotlight-junit.xml
    displayName: Spotlight Governance
  - task: PublishTestResults@2
    condition: always()
    inputs:
      testResultsFormat: JUnit
      testResultsFiles: spotlight-junit.xml
      testRunTitle: Spotlight Governance
