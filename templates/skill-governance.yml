# .github/workflows/skill-governance.yml — gate agent skills (SKILL.md) on every PR.
# Requires spotlight-cli with markdown/skill support (ships with the 1.0 release).
name: Skill Governance
on:
  pull_request:
  push:
    branches: [main]
jobs:
  spotlight-skills:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: api-commons/spotlight-pipeline@v1
        with:
          files: '**/SKILL.md'
          ruleset: '.spotlight-skill.yaml'
          fail-severity: 'error'
